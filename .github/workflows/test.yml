on:
  workflow_call:
    inputs:
      disable-windows:
        description: Disable running tests on Windows
        type: boolean
        default: true
        required: false
      node-versions:
        description: 'Node versions to test (JSON array). Use "auto" to read from package.json.'
        type: string
        default: '["auto"]'
        required: false

jobs:
  test_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(inputs.node-versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version != 'auto' && matrix.node-version || '' }}
          node-version-file: ${{ matrix.node-version == 'auto' && 'package.json' || '' }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm test

  test_windows:
    if: ${{ !inputs.disable-windows }}
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(inputs.node-versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version != 'auto' && matrix.node-version || '' }}
          node-version-file: ${{ matrix.node-version == 'auto' && 'package.json' || '' }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm test
