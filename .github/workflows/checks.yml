on: [workflow_call]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint:check
      - run: pnpm format:check
      - run: pnpm typecheck
